<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alera EMR · Nigeria's Fastest Clinic Platform</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet"
  />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: #F7F5F1; }
    #root { min-height: 100vh; }
    /* Prevent FOUC on fonts */
    body { opacity: 0; animation: appear 0.01s 0.05s forwards; }
    @keyframes appear { to { opacity: 1; } }
  </style>
</head>

  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
